name: Convert Report to PDF

on:
  workflow_dispatch:
    inputs:
      report:
        description: 'Report to update'
        required: true
        type: choice
        options:
        - Aciclovir-Mean
        - Aciclovir-Mean-SVG
  
jobs:
  convert:
    runs-on: windows-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true
    - name: install pagedjs
      run: |
        npm install -g pagedjs-cli
    - name: Install Pandoc
      uses: r-lib/actions/setup-pandoc@v2
    - name: Install knitr
      run: |
        R -e 'install.packages("knitr")'
    - name: Perform html conversion with pandoc
      run: |
        R -e 'writeLines(c("embed-resources:", "standalone:", "css: osp.css", "o: Reports/${{ inputs.report }}/Report.html", "pdf-engine: pagedjs-cli"), "config.txt")'
        R -e 'knitr::pandoc("Reports/${{ inputs.report }}/Report.md", format = "pdf", config = "config.txt")'
    - name: Save PDF file as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.report }}-pdf
        path: ./Reports/${{ inputs.report }}
